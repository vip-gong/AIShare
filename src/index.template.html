<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AGI之路：论文时间线</title>
  <meta name="description" content="用可检索时间线梳理 AI 领域里程碑论文。">
  <style>
/* __CSS__ */
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="masthead">
      <div class="brand">
        <div>
          <h1>
            <span class="title-main">AGI之路</span>
            <span class="title-subtitle">reread,rethink,rebuild</span>
          </h1>
        </div>
      </div>
    </header>

    <section class="control-deck" aria-label="论文筛选控制">
      <div class="control-grid">
        <div class="control-main">
          <div class="search-row">
            <label class="search-field" for="searchInput">
              <span>关键词</span>
              <input id="searchInput" type="search" autocomplete="off" placeholder="搜索论文、作者、方法或年份">
            </label>
            <label class="category-select-field" for="categorySelect">
              <span>技术主题</span>
              <select id="categorySelect" aria-label="按技术主题筛选"></select>
            </label>
          </div>
        </div>
      </div>
    </section>

    <section class="workspace" id="timelineView" aria-label="论文时间线工作区">
      <section class="timeline" id="timeline" aria-live="polite"></section>
    </section>

    <section class="paper-page" id="paperPage" aria-live="polite" hidden></section>
  </main>

  <script>
    window.__AI_PAPERS__ = __PAPERS_JSON__;
  </script>
  <script>
/* __APP_JS__ */
  </script>
</body>
</html>
